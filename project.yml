name: Transcride
options:
  bundleIdPrefix: com.ashandevine
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true
packages:
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio.git
    from: 0.15.5
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit.git
    from: 1.0.0
settings:
  base:
    SWIFT_VERSION: "6.0"
    ARCHS: arm64
    ONLY_ACTIVE_ARCH: YES
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual
    DEVELOPMENT_TEAM: ""
targets:
  Transcride:
    type: application
    platform: macOS
    sources:
      - Transcride
      - path: EditorWeb/dist
        type: folder
        buildPhase: resources
      - path: EditorWeb/THIRD_PARTY_NOTICES.md
        buildPhase: resources
    dependencies:
      - package: FluidAudio
      - package: WhisperKit
      - sdk: libsqlite3.tbd
      - sdk: WebKit.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ashandevine.transcride
        PRODUCT_NAME: Transcride
        CODE_SIGN_ENTITLEMENTS: Transcride/Transcride.entitlements
        ENABLE_HARDENED_RUNTIME: NO
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: "1.2.0"
        CURRENT_PROJECT_VERSION: "3"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
        INFOPLIST_KEY_NSHumanReadableCopyright: "© 2026 Ashan Devine"
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Transcride records voice memos with your microphone. Audio is stored only in your local vault."
  TranscrideTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - TranscrideTests
      - Transcride/Core
    dependencies:
      - sdk: libsqlite3.tbd
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ashandevine.transcrideTests
        GENERATE_INFOPLIST_FILE: YES
  TranscrideIntegrationTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - TranscrideIntegrationTests
    dependencies:
      - target: Transcride
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ashandevine.transcrideIntegrationTests
        GENERATE_INFOPLIST_FILE: YES
schemes:
  Transcride:
    build:
      targets:
        Transcride: all
        TranscrideTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - TranscrideTests
        - TranscrideIntegrationTests
