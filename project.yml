name: Transcride
options:
  bundleIdPrefix: com.ashandevine
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true
packages:
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio.git
    from: 0.15.5
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit.git
    from: 1.0.0
settings:
  base:
    SWIFT_VERSION: "6.0"
    ARCHS: arm64
    ONLY_ACTIVE_ARCH: YES
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual
    DEVELOPMENT_TEAM: ""
targets:
  Transcride:
    type: application
    platform: macOS
    sources:
      - Transcride
    dependencies:
      - package: FluidAudio
      - package: WhisperKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ashandevine.transcride
        PRODUCT_NAME: Transcride
        CODE_SIGN_ENTITLEMENTS: Transcride/Transcride.entitlements
        ENABLE_HARDENED_RUNTIME: NO
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Transcride records voice memos with your microphone. Audio is stored only in your local vault."
  TranscrideTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - TranscrideTests
      - Transcride/Core
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ashandevine.transcrideTests
        GENERATE_INFOPLIST_FILE: YES
schemes:
  Transcride:
    build:
      targets:
        Transcride: all
        TranscrideTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - TranscrideTests
